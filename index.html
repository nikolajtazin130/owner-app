<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OWNER</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0f0f0f);
      --text: var(--tg-theme-text-color, #ffffff);
      --hint: var(--tg-theme-hint-color, #8a8a8a);
      --card: var(--tg-theme-secondary-bg-color, #1c1c1e);
      --accent: #c8a86b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px 16px 40px; -webkit-tap-highlight-color: transparent;
    }
    .logo { text-align:center; letter-spacing:6px; font-weight:700; font-size:26px; color:var(--accent); margin-bottom:4px; }
    .subtitle { text-align:center; color:var(--hint); font-size:13px; margin-bottom:28px; }
    .section-title { font-size:14px; color:var(--hint); text-transform:uppercase; letter-spacing:1px; margin:24px 4px 12px; }
    .card { background:var(--card); border-radius:16px; padding:18px; margin-bottom:12px; border:1px solid rgba(255,255,255,0.05); cursor:pointer; transition:transform .1s; position:relative; }
    .card:active { transform:scale(0.98); }
    .card h3 { font-size:17px; margin-bottom:6px; }
    .card p { font-size:13px; color:var(--hint); line-height:1.4; }
    .badge { display:inline-block; font-size:11px; color:var(--accent); border:1px solid var(--accent); border-radius:20px; padding:2px 10px; margin-bottom:10px; }
    /* === ЗАКРЫТЫЙ СЕЗОН === */
    .card.locked { opacity:0.55; }
    .card.locked .badge { color:var(--hint); border-color:var(--hint); }
    .card .lock-icon { position:absolute; top:16px; right:18px; font-size:18px; opacity:0.8; }
    .lesson { background:var(--card); border-radius:14px; padding:16px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.05); cursor:pointer; transition:transform .1s; display:flex; align-items:flex-start; gap:12px; }
    .lesson:active { transform:scale(0.98); }
    .lesson .num { color:var(--accent); font-weight:700; font-size:14px; min-width:24px; padding-top:2px; }
    .lesson .info h4 { font-size:15px; margin-bottom:4px; line-height:1.3; }
    .lesson .info p { font-size:12px; color:var(--hint); line-height:1.4; }
    .back-btn { display:inline-flex; align-items:center; gap:6px; color:var(--accent); background:none; border:none; font-size:15px; cursor:pointer; margin-bottom:16px; padding:4px 0; }
    .season-header { font-size:22px; font-weight:700; margin-bottom:4px; }
    .season-sub { font-size:13px; color:var(--hint); margin-bottom:20px; }
    .footer { text-align:center; color:var(--hint); font-size:12px; margin-top:32px; }
    .center-screen { min-height:80vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 10px; }
    .lock-title { font-size:20px; font-weight:700; margin-bottom:12px; }
    .lock-text { font-size:14px; color:var(--hint); line-height:1.5; margin-bottom:28px; max-width:300px; }
    .join-btn { background:var(--accent); color:#000; font-size:16px; font-weight:700; letter-spacing:1px; border:none; border-radius:14px; padding:16px 28px; cursor:pointer; text-transform:uppercase; }
    .join-btn:active { transform:scale(0.97); }
    .spinner { width:32px; height:32px; border:3px solid rgba(255,255,255,0.15); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .hidden { display:none; }
    .empty { color:var(--hint); text-align:center; padding:40px 0; }
    /* всплывающее уведомление */
    .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--card); color:var(--text); border:1px solid rgba(255,255,255,0.1); padding:14px 22px; border-radius:14px; font-size:14px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:100; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div id="loading" class="center-screen">
    <div class="spinner"></div>
    <p style="margin-top:16px;color:var(--hint);font-size:13px;">Проверяем доступ…</p>
  </div>

  <div id="locked" class="center-screen hidden">
    <div class="logo">TRIUMPH OWNER</div>
    <div class="subtitle">Закрытый мужской канал</div>
    <div class="lock-title">Доступ только для участников</div>
    <p class="lock-text">Это приложение доступно только действующим участникам клуба OWNER. Чтобы получить доступ — оформляй подписку.</p>
    <button class="join-btn" onclick="goToPayment()">Вступить в Triumph Owner</button>
  </div>

  <div id="content" class="hidden">
    <div class="logo">TRIUMPH OWNER</div>
    <div class="subtitle">Закрытый мужской канал</div>
    <div class="section-title">Сезоны</div>
    <div id="seasons-list"></div>
    <div class="footer" id="hello">OWNER · v0.3</div>
  </div>

  <div id="season-view" class="hidden">
    <button class="back-btn" onclick="backToMain()">← Назад</button>
    <div class="season-header" id="season-title"></div>
    <div class="season-sub" id="season-sub"></div>
    <div id="lessons-list"></div>
    <div class="footer">OWNER · v0.3</div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    // === НАСТРОЙКИ ===
    const WORKER_URL  = "https://subscription-check.nikolajtazin130.workers.dev/";
    const PAYMENT_BOT = "https://t.me/TriumphOwnerBot";
    const CHANNEL_BASE = "https://t.me/c/3214991403/";
    const DATA_PATH = "data/";
    // ==================

    const user = tg.initDataUnsafe?.user;
    let seasonsCache = null;

    function showScreen(id) {
      ['loading','locked','content','season-view'].forEach(s =>
        document.getElementById(s).classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    function goToPayment() {
      tg.HapticFeedback?.impactOccurred('medium');
      tg.openTelegramLink(PAYMENT_BOT);
    }

    // всплывающее сообщение
    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    async function loadSeasons() {
      if (seasonsCache) return seasonsCache;
      const res = await fetch(DATA_PATH + "seasons.json?v=" + Date.now());
      seasonsCache = await res.json();
      return seasonsCache;
    }

    function renderSeasons(seasons) {
      const list = document.getElementById('seasons-list');
      list.innerHTML = seasons.map((s, i) => {
        if (s.locked) {
          return `
            <div class="card locked" onclick="lockedTap()">
              <span class="lock-icon">🔒</span>
              <span class="badge">${s.badge}</span>
              <h3>${s.title}</h3>
              <p>${s.desc}</p>
            </div>`;
        }
        return `
          <div class="card" onclick="openSeasonByIndex(${i})">
            <span class="badge">${s.badge}</span>
            <h3>${s.title}</h3>
            <p>${s.desc}</p>
          </div>`;
      }).join('');
    }

    function lockedTap() {
      tg.HapticFeedback?.notificationOccurred?.('warning');
      showToast('🔒 Сезон ещё закрыт. Скоро откроется.');
    }

    function openSeasonByIndex(i) {
      const s = seasonsCache[i];
      openSeason(s.file, s.title, s.sub);
    }

    async function openSeason(file, title, sub) {
      tg.HapticFeedback?.impactOccurred('light');
      document.getElementById('season-title').textContent = title;
      document.getElementById('season-sub').textContent = sub;
      const listEl = document.getElementById('lessons-list');
      listEl.innerHTML = '<div class="empty">Загрузка…</div>';
      showScreen('season-view');

      if (!file) { listEl.innerHTML = '<div class="empty">Материалы скоро появятся.</div>'; return; }

      try {
        const res = await fetch(DATA_PATH + file + "?v=" + Date.now());
        const lessons = await res.json();
        if (!lessons.length) { listEl.innerHTML = '<div class="empty">Материалы скоро появятся.</div>'; return; }
        listEl.innerHTML = lessons.map((les, i) => `
          <div class="lesson" onclick="openPost(${les.id})">
            <div class="num">${i + 1}</div>
            <div class="info"><h4>${les.t}</h4><p>${les.d}</p></div>
          </div>
        `).join('');
      } catch (e) {
        listEl.innerHTML = '<div class="empty">Не удалось загрузить. Попробуй позже.</div>';
      }
    }

    function openPost(postId) {
      tg.HapticFeedback?.impactOccurred('light');
      tg.openTelegramLink(CHANNEL_BASE + postId);
    }

    function backToMain() {
      tg.HapticFeedback?.impactOccurred('light');
      showScreen('content');
    }

    async function checkAccess() {
      if (!user?.id) { showScreen('locked'); return; }
      try {
        const res = await fetch(WORKER_URL + "?user_id=" + user.id);
        const data = await res.json();
        if (data.ok && data.subscribed) {
          if (user?.first_name) {
            document.getElementById('hello').textContent = 'Привет, ' + user.first_name + ' · OWNER v0.3';
          }
          const seasons = await loadSeasons();
          renderSeasons(seasons);
          showScreen('content');
        } else {
          showScreen('locked');
        }
      } catch (e) {
        showScreen('locked');
      }
    }

    checkAccess();
  </script>
</body>
</html>
